services:

  app:
    build: .
    container_name: qc-tools-app
    restart: unless-stopped
    volumes:
      - .:/var/www
      - vendor:/var/www/vendor
    depends_on:
      - db
    environment:
      - APP_ENV=local

  nginx:
    image: nginx:alpine
    container_name: qc-tools-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: qc-tools-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: qc_tools
      MYSQL_USER: qc_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql

volumes:
  vendor:
  db_data: